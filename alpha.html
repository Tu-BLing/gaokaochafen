<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高考查分系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #ffffff;
            color: #000000;
            padding: 20px;
        }

        .main-text {
            font-size: clamp(2rem, 10vw, 6rem);
            font-weight: 700;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="main-text">信这个的这辈子有了</div>
</body>
</html>
